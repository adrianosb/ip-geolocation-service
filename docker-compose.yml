services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - APP_GEOLOCATION_API_URL=http://ip-api.com/json
      - APP_GEOLOCATION_TIMEOUT_SECONDS=5
      - APP_FALLBACK_COUNTRY_CODE=BR
      - APP_FALLBACK_COUNTRY_NAME=Brazil
      - APP_CACHE_TTL_HOURS=24
      - APP_CACHE_MAX_SIZE=10000
